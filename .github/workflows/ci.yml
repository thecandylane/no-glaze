name: ci

on:
  push:
    branches: [main]
  pull_request:

# No untrusted interpolations in run: blocks — all `${{ ... }}` uses are
# `github.ref`, `secrets.*`, or matrix vars. None of github.event.*.title /
# .body / .ref / .name fields are interpolated into shell.
jobs:
  test-node:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Node tests
        shell: bash
        run: |
          node --test \
            "tests/hooks/"*.js \
            "tests/installer/"*.js \
            "tests/composition/"*.js \
            "tests/smoke/"*.js

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r evals/requirements.txt
      - run: python3 -m pytest tests/installer/ tests/unit/

